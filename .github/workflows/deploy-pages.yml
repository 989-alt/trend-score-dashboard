name: Deploy demo to GitHub Pages

# Builds the React SPA as a STATIC demo (bundled sample JSON, no backend) and
# publishes it to GitHub Pages. Live data requires the OCI backend deployment.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /trend-score-dashboard/
          # 정적 샘플 폴백 + (repo Variable API_BASE 설정 시) OCI 백엔드 라이브 fetch.
          # API_BASE 비어있으면 샘플 데모, OCI URL(https) 넣으면 실데이터.
          VITE_STATIC: "1"
          VITE_API_BASE: ${{ vars.API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
